<div class="min-h-screen flex items-center justify-center bg-[var(--gradient-bg)] p-4">
  <div class="glass-card p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold" style="color: var(--color-primary);">Callix</h1>
      <p class="mt-2 text-muted-color">P2P meetings & chat — no servers, no limits</p>
    </div>

    <div class="flex flex-col gap-6">
      <p-floatLabel>
        <input pInputText id="displayName" type="text" [(ngModel)]="displayName" class="w-full" />
        <label for="displayName">Display Name</label>
      </p-floatLabel>

      <p-button
        label="Sign in with Google"
        (onClick)="loginWithGoogle()"
        [disabled]="isLoading"
        styleClass="w-full"
      />

      <p-button
        label="Sign Up"
        (onClick)="signUp()"
        [disabled]="isLoading"
        severity="secondary"
        [text]="true"
        styleClass="w-full"
      />
    </div>

    <p class="text-center mt-6 text-sm text-muted-color">
      By continuing, you agree to our terms of service
    </p>
  </div>
</div>
