<p-dialog [visible]="show && isHost" (visibleChange)="close.emit()" header="Media Player" [modal]="true"
  [draggable]="false" [resizable]="false" [closable]="true" class="max-w-md w-full">
  <input pInputText type="text" [(ngModel)]="mediaUrl" placeholder="Enter media URL (audio/video)"
    class="w-full mb-4" />
  <ng-template pTemplate="footer">
    <div class="flex gap-2 justify-evenly">
      <p-button label="Play" (onClick)="loadMedia.emit()"></p-button>
      <p-button label="Cancel" severity="secondary" [text]="true" (onClick)="close.emit()"></p-button>
    </div>
  </ng-template>
</p-dialog>
